name: Smart Contract CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'smartcontract/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'smartcontract/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smartcontract/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('smartcontract/**/Cargo.lock', 'smartcontract/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build all contracts
        working-directory: smartcontract
        run: cargo build --all

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smartcontract/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('smartcontract/**/Cargo.lock', 'smartcontract/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run all tests
        working-directory: smartcontract
        run: cargo test --all

  lint:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smartcontract/target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('smartcontract/**/Cargo.lock', 'smartcontract/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run Clippy
        working-directory: smartcontract
        run: cargo clippy --all -- -D warnings

  fmt:
    name: Rustfmt Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: smartcontract
        run: cargo fmt --all -- --check
